<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRM Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="map"></div>

<div class="map-header">
  <button id="backBtn" title="ペース管理に戻る">← 戻る</button>
  <span class="map-title">BRM MAP</span>
  <span id="statusText" class="map-status">GPS待機中…</span>
</div>

<div class="map-bottom-bar">
  <input type="file" id="gpxFileInput" accept=".gpx" style="display:none;">
  <button id="loadGpxBtn">🗺️ GPX読込</button>
  <button id="downloadAreaBtn">💾 エリア保存</button>
  <button id="wakeLockBtn">🔓 画面OFF可</button>
  <button id="recenterBtn" class="recenter-btn" style="display:none;">🎯 現在地</button>
</div>

<div id="downloadProgressOverlay" class="download-progress-overlay" style="display:none;">
  <div class="download-progress-box">
    <div class="download-progress-title">ルート周辺タイルをダウンロード中</div>
    <div id="downloadProgressText" class="download-progress-text">0 / 0 タイル</div>
    <div class="download-progress-track">
      <div id="downloadProgressFill" class="download-progress-fill"></div>
    </div>
    <div class="download-progress-note">Wi-Fi環境のまま、画面をそのままにしてお待ちください。</div>
    <button id="cancelDownloadBtn">中止する</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/script.js"></script>
</body>
</html>
