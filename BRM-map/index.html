<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BRM Map</title>
<link rel="stylesheet" href="js/vendor/leaflet/leaflet.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="mapOuter">
  <div id="map"></div>
</div>

<div class="map-header">
  <div class="map-header-row1">
    <button id="backBtn" title="ペース管理に戻る">← 戻る</button>
    <div class="header-pace-display">
      <span id="headerGross" class="header-pace-value">--</span>
      <span class="header-pace-sep">/</span>
      <span id="headerRemain" class="header-pace-value">--</span>
    </div>
    <span id="statusText" class="map-status">GPS待機中…</span>
    <span id="offlineBadge" class="offline-badge" style="display:none;" title="オフラインです。GPSと保存済みタイルのみで動作しています">オフライン</span>
    <button id="menuBtn" title="メニュー">☰</button>
  </div>
  <div class="map-header-row2" id="headerRow2">
    <span class="hdr2-item" id="hdr2Speed" style="display:none;"><span class="hdr2-label">速度</span><span class="hdr2-value" id="hdr2SpeedVal">--</span><span class="hdr2-unit">km/h</span></span>
    <span class="hdr2-sep hdr2-speed-sep" style="display:none;">│</span>
    <span class="hdr2-item" id="hdr2Elapsed" style="display:none;"><span class="hdr2-label">経過</span><span class="hdr2-value" id="hdr2ElapsedVal">--</span></span>
    <span class="hdr2-sep hdr2-elapsed-sep" style="display:none;">│</span>
    <span class="hdr2-item" id="hdr2RemainTime" style="display:none;"><span class="hdr2-label">残時間</span><span class="hdr2-value" id="hdr2RemainTimeVal">--</span></span>
    <span class="hdr2-sep hdr2-remaintime-sep" style="display:none;">│</span>
    <span class="hdr2-item" id="hdr2Need" style="display:none;"><span class="hdr2-label">必要</span><span class="hdr2-value" id="hdr2NeedVal">--</span><span class="hdr2-unit">km/h</span></span>
    <span class="hdr2-sep hdr2-need-sep" style="display:none;">│</span>
    <span class="hdr2-item" id="hdr2Saving" style="display:none;"><span class="hdr2-label">貯金</span><span class="hdr2-value" id="hdr2SavingVal">--</span></span>
  </div>
</div>

<div id="elevationPanel" class="elevation-panel" style="display:none;">
  <div class="elevation-panel-labels">
    <span id="elevMinLabel" class="elevation-minmax">--m</span>
    <span id="elevCurLabel" class="elevation-current">現在 --m</span>
    <span id="elevMaxLabel" class="elevation-minmax">--m</span>
  </div>
  <svg id="elevationSvg" class="elevation-svg" viewBox="0 0 1000 100" preserveAspectRatio="none"></svg>
  <div class="elevation-panel-dist">
    <span id="elevFromLabel">-1km</span>
    <span id="elevToLabel">+9km</span>
  </div>
</div>

<div id="orientationModeBtn" class="floating-icon-btn" title="地図の向き">🧭</div>
<div id="recenterBtn" class="floating-icon-btn recenter-icon" title="現在地に戻る" style="display:none;">🎯</div>

<div class="center-zoom-controls">
  <button id="zoomInBtn" title="拡大">＋</button>
  <button id="zoomOutBtn" title="縮小">－</button>
</div>

<div id="mapMenuModal" class="map-menu-modal">
  <div class="map-menu-content">
    <div class="map-menu-header">
      <span>メニュー</span>
      <button id="menuCloseBtn">✕</button>
    </div>
    <button id="downloadAreaBtn" class="map-menu-item">💾 ルート周辺タイルを保存（事前ダウンロード）</button>
    <p class="map-menu-note">Wi-Fi等の通信環境がある場所で実行してください。完了後はオフラインでも保存済みの範囲が地図表示に使えます。</p>

    <div class="map-menu-section-title">ヘッダー2行目の表示項目</div>
    <div class="map-menu-row">
      <label for="hdr2SpeedToggle">🚀 現在速度</label>
      <input type="checkbox" id="hdr2SpeedToggle">
    </div>
    <div class="map-menu-row">
      <label for="hdr2ElapsedToggle">⏱ 経過時間</label>
      <input type="checkbox" id="hdr2ElapsedToggle">
    </div>
    <div class="map-menu-row">
      <label for="hdr2RemainTimeToggle">⏳ 残り時間</label>
      <input type="checkbox" id="hdr2RemainTimeToggle">
    </div>
    <div class="map-menu-row">
      <label for="hdr2NeedToggle">⚡ 必要平均速度</label>
      <input type="checkbox" id="hdr2NeedToggle">
    </div>
    <div class="map-menu-row">
      <label for="hdr2SavingToggle">💰 貯金時間</label>
      <input type="checkbox" id="hdr2SavingToggle">
    </div>

    <div class="map-menu-section-title">地図の表示項目</div>
    <div class="map-menu-row">
      <label for="layerRouteToggle">🛣 ルート線</label>
      <input type="checkbox" id="layerRouteToggle" checked>
    </div>
    <div class="map-menu-row">
      <label for="layerArrowToggle">➡ 進行方向矢印</label>
      <input type="checkbox" id="layerArrowToggle" checked>
    </div>
    <div class="map-menu-row">
      <label for="layerPcToggle">🔵 PCチェックポイント</label>
      <input type="checkbox" id="layerPcToggle" checked>
    </div>
    <div class="map-menu-row">
      <label for="layerShopToggle">🏪 休憩スポット</label>
      <input type="checkbox" id="layerShopToggle" checked>
    </div>
    <div class="map-menu-row">
      <label for="layerElevToggle">📈 標高グラフ（現在地の前後）</label>
      <input type="checkbox" id="layerElevToggle" checked>
    </div>

    <div class="map-menu-section-title">表示設定</div>
    <div class="map-menu-row">
      <label>現在地マークの形</label>
    </div>
    <div class="marker-shape-grid">
      <button type="button" class="marker-shape-option" data-shape="arrow" title="矢印（進行方向を表示）">
        <span class="shape-preview shape-preview-arrow"></span>矢印
      </button>
      <button type="button" class="marker-shape-option" data-shape="circle" title="丸">
        <span class="shape-preview shape-preview-circle"></span>丸
      </button>
      <button type="button" class="marker-shape-option" data-shape="bike" title="自転車">🚲 自転車</button>
      <button type="button" class="marker-shape-option" data-shape="pin" title="ピン">📍 ピン</button>
    </div>
    <div class="map-menu-row">
      <label for="markerColorInput">現在地マーカーの色<br><span class="map-menu-subnote">（矢印・丸の形のみ反映されます）</span></label>
      <input type="color" id="markerColorInput" value="#00d2ff">
    </div>
    <div class="map-menu-row">
      <label for="routeColorInput">ルート線の色</label>
      <input type="color" id="routeColorInput" value="#ff8c00">
    </div>
    <div class="map-menu-row">
      <label for="routeWidthInput">ルート線の太さ <span id="routeWidthValue">4</span>px</label>
      <input type="range" id="routeWidthInput" min="1" max="10" step="1" value="4">
    </div>
    <div class="map-menu-row">
      <label for="routeOpacityInput">ルート線の透過度 <span id="routeOpacityValue">85</span>%</label>
      <input type="range" id="routeOpacityInput" min="10" max="100" step="5" value="85">
    </div>
    <button id="resetDisplaySettingsBtn" class="map-menu-item secondary">表示設定を初期値に戻す</button>

    <div class="map-menu-section-title">通知設定</div>
    <div class="map-menu-row">
      <label for="offRouteSoundToggle">🔔 ルート逸脱時に音で通知</label>
      <input type="checkbox" id="offRouteSoundToggle" checked>
    </div>

    <div class="map-menu-section-title">画面設定</div>
    <div class="map-menu-row">
      <label for="wakeLockToggle">🔒 走行中、画面を常にONにする</label>
      <input type="checkbox" id="wakeLockToggle">
    </div>
    <button id="resetIconPositionsBtn" class="map-menu-item secondary">📍 地図上アイコンの位置を初期化</button>
  </div>
</div>

<div id="downloadProgressOverlay" class="download-progress-overlay" style="display:none;">
  <div class="download-progress-box">
    <div class="download-progress-title">ルート周辺タイルをダウンロード中</div>
    <div id="downloadProgressText" class="download-progress-text">0 / 0 タイル</div>
    <div class="download-progress-track">
      <div id="downloadProgressFill" class="download-progress-fill"></div>
    </div>
    <div class="download-progress-note">Wi-Fi環境のまま、画面をそのままにしてお待ちください。</div>
    <button id="cancelDownloadBtn">中止する</button>
  </div>
</div>

<script src="js/vendor/leaflet/leaflet.js"></script>
<script src="js/script.js"></script>
</body>
</html>
